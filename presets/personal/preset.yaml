name: personal
description: For personal vaults. Memories, journal entries, identity-anchored writing. Looser linking, friendlier vocabulary.

dimensions:
  atomicity: 0.55
  organization: 0.50
  linking: 0.40
  processing: 0.40
  navigation: 2-tier
  schema: minimal
  automation: minimal

self_space: true            # personal vaults have a self/ directory for identity + goals + values

qmd:
  enabled: true
  collection: ${VAULT_NAME}

note_types:
  - memory
  - person
  - place
  - reflection
  - life-area-map
  - index

starter_mocs:
  - index
