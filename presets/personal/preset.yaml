name: personal
description: For personal vaults. Memories, journal entries, identity-anchored writing. Looser linking, friendlier vocabulary.

dimensions:
  atomicity: 0.55
  organization: 0.50
  linking: 0.40
  processing: 0.40
  navigation: 2-tier
  schema: minimal
  automation: minimal

self_space: true            # personal vaults have a self/ directory for identity + goals + values

qmd:
  enabled: true
  collection: ${VAULT_NAME}

# Surrender tracking — opt-in. The default axis vector (mechanism / implications / falsifiability / bounds)
# is research-oriented; for personal vaults, memories rather than propositions, the axes apply less
# directly. Enable only if you want to formalise reflection-engagement on your memories — and consider
# adapting the axes in the no-surrender skill (e.g. "presence", "context", "trigger" might fit better
# than "falsifiability" / "bounds").
surrender:
  enabled: false            # MASTER FLAG. Default off; opt-in only.
  walk_integration: true
  default_harshness: 0.3    # Lower default harshness for personal — engagement is fuzzier, not load-bearing for citations.

note_types:
  - memory
  - person
  - place
  - reflection
  - life-area-map
  - index

starter_mocs:
  - index
