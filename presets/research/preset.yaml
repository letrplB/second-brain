name: research
description: For research vaults. Atomic claims with strong cross-linking, evidence-typed, paper-sourced.

# Configuration dimensions (0..1 scalars; sensible defaults — adjustable per vault)
dimensions:
  atomicity: 0.85
  organization: 0.30
  linking: 0.70
  processing: 0.70
  navigation: 3-tier        # hub → domain → topic → leaf
  schema: dense
  automation: minimal       # /anneal commits explicitly; no hooks

# Whether to include a self/ directory for identity/goals
self_space: false           # research vaults keep goals.md at vault root

# Default tooling
qmd:
  enabled: true             # qmd MCP for semantic search
  collection: ${VAULT_NAME}

# Surrender tracking — per-claim engagement metric with FSRS-inspired decay.
# Default OFF — user enables this as a deliberate choice (matches the "deliberate activation" principle).
# When enabled: /no-surrender probes user grip on claims (mechanism / implications / falsifiability / bounds);
# /walk surfaces engagement column + weakest-grip panel + deployment_safety footer.
# Skills MUST read this file at every invocation — never cache the flag.
surrender:
  enabled: false            # MASTER FLAG. Set true to enable the surrender system.
  walk_integration: true    # When master is on, surface engagement in /walk output.
  default_harshness: 0.4    # Default λ for /walk weighted ranking. weight = (1 - λ) + λ · engagement.

# Note types this preset uses
note_types:
  - claim
  - paper
  - method
  - topic-map               # _topic.md
  - domain-map              # _domain.md
  - index                   # index.md (root hub)

# Default starter MOC structure
starter_mocs:
  - index
  - _domain (placeholder; user renames at /init time)
